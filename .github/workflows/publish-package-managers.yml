name: Publish Package Managers

# Publishes each stable release to winget and a Scoop bucket. cargo-dist does not handle these
# natively, so they run here — but as a dist *publish-job*, not a standalone event-triggered
# workflow.
#
# Why a reusable workflow (workflow_call) instead of `on: release: [released]`: dist undrafts the
# release with `gh release edit --draft=false` using GITHUB_TOKEN, and GitHub suppresses workflow
# runs for events fired by GITHUB_TOKEN (anti-recursion). A `release` trigger would therefore NEVER
# fire. Referenced from dist-workspace.toml as `publish-jobs = ["./publish-package-managers"]`, dist
# calls this from *within* the release run (after `host` uploads + undrafts), so there is no second
# event and no anti-recursion. See docs/releasing.md.
#
# `plan` is dist's release manifest (JSON); the tag comes from `announcement_tag`. dist only invokes
# publish-jobs for a real (non-prerelease) publishing run, so no extra gating is needed here.
#
# Both jobs are self-guarding: if the required secret is absent the publish step is skipped, so the
# release stays green until the maintainer sets the WINGET_TOKEN / SCOOP_BUCKET_TOKEN secrets.
on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: read

jobs:
  # Opens a PR to microsoft/winget-pkgs with the release's .msi. The package identifier must
  # already exist there (first submission is manual — see docs/releasing.md).
  winget:
    runs-on: ubuntu-latest
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
      TAG: ${{ fromJson(inputs.plan).announcement_tag }}
    steps:
      # No `release` event is in scope (dist calls this via workflow_call), so the tag and version
      # are taken from the plan and passed to the action explicitly rather than auto-derived.
      - name: Resolve version
        if: ${{ env.WINGET_TOKEN != '' }}
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Publish to winget
        if: ${{ env.WINGET_TOKEN != '' }}
        uses: vedantmgoyal/winget-releaser@v2
        with:
          identifier: GiovaniFreitag.Lode
          installers-regex: 'lode-x86_64-pc-windows-msvc\.msi$'
          release-tag: ${{ env.TAG }}
          version: ${{ steps.ver.outputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}

  # Renders the manifest template with this release's version + zip URL + sha256 and pushes it to
  # the Scoop bucket repo (manifests live under its bucket/ directory).
  scoop:
    runs-on: ubuntu-latest
    env:
      SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
      # owner/repo of the Scoop bucket to update — the maintainer creates this repo.
      BUCKET_REPO: giovani-freitag/scoop-lode
    steps:
      - uses: actions/checkout@v6
      - name: Update Scoop bucket
        if: ${{ env.SCOOP_BUCKET_TOKEN != '' }}
        env:
          TAG: ${{ fromJson(inputs.plan).announcement_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ZIP="lode-x86_64-pc-windows-msvc.zip"
          URL="https://github.com/${REPO}/releases/download/${TAG}/${ZIP}"

          curl --proto '=https' --tlsv1.2 -LsSf -o "$ZIP" "$URL"
          HASH=$(sha256sum "$ZIP" | cut -d' ' -f1)

          git clone "https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/${BUCKET_REPO}.git" bucket
          mkdir -p bucket/bucket
          jq --arg v "$VERSION" --arg url "$URL" --arg hash "$HASH" \
            '.version = $v
             | .architecture."64bit".url = $url
             | .architecture."64bit".hash = $hash' \
            packaging/scoop/lode.json > bucket/bucket/lode.json

          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/lode.json
          git commit -m "lode: update to ${VERSION}"
          git push
