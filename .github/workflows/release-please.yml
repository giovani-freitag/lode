name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Config lives in release-please-config.json + .release-please-manifest.json. The release is
      # created as a DRAFT (draft: true) so the README installer one-liners — which point at
      # releases/latest/download/ — never resolve to a release whose binaries aren't uploaded yet.
      # dist's release.yml uploads the artifacts and then flips the release public (--draft=false).
      # Merging the release PR bumps Cargo.toml/Cargo.lock, updates CHANGELOG.md, and creates the
      # tag + draft release.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # Kick off the dist release build for the tag just created. A tag *push* by GITHUB_TOKEN
      # can't trigger a workflow (anti-recursion guard), but a workflow_dispatch can — so we
      # dispatch the dist release workflow (which runs in dispatch mode). No PAT needed.
      - name: Trigger release binaries
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # -R is required: this job doesn't check out the repo, so gh can't infer it from git.
        run: gh workflow run release.yml -R ${{ github.repository }} -f tag='${{ steps.release.outputs.tag_name }}'
