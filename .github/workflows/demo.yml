name: Demo GIF

# Renders demo.tape into assets/demo.gif and opens a PR when the result changes — it never commits
# to main directly, so the visual diff always gets a human glance before it ships. Runs on Linux
# because VHS needs ttyd + ffmpeg (not available on Windows).
#
# Triggers:
#   - workflow_dispatch: render on demand (e.g. to refresh after an upstream mod/version change).
#   - push to main touching the tape or the commands the demo shows: catch output-format changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - demo.tape
      - src/commands/init.rs
      - src/commands/add.rs
      - src/commands/list.rs
      - src/ui.rs

permissions:
  contents: write
  pull-requests: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build from source so the GIF reflects the current CLI, not the last release.
      - name: Build lode
        run: cargo build --release
      - name: Put lode on PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"
      # Install VHS + deps directly — vhs-action's bundled ffmpeg installer fails on the runner.
      # (go-rod fetches a headless Chromium at render time, so none is installed here.)
      - name: Install VHS and dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Render demo.tape
        run: vhs demo.tape
      # Always publish the render as an artifact so a manual dispatch can be reviewed without a PR.
      - name: Upload the GIF for review
        uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: assets/demo.gif
      # Open (or update) a PR only when the GIF actually changed — a no-op otherwise. The image diff
      # in the PR is the review surface; merging is what lands it on main.
      - name: Open a PR if the GIF changed
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: assets/demo.gif
          branch: chore/refresh-demo-gif
          delete-branch: true
          commit-message: "docs: refresh the walkthrough gif"
          title: "docs: refresh the walkthrough gif"
          body: |
            Auto-rendered from `demo.tape` (trigger: `${{ github.event_name }}`).

            Review the image diff below and merge if it looks right. Close it if the change is just
            render jitter and not worth shipping.
