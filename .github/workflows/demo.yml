name: Demo GIF

# Renders demo.tape into assets/demo.gif. Manual — run after changing the CLI's output or the tape.
# By default it only uploads the GIF as an artifact for review; pass publish=true to also commit it
# to main. Runs on Linux because VHS needs ttyd + ffmpeg (not available on Windows).
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Commit the rendered GIF to main (default: preview only, uploaded as an artifact)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build from source so the GIF reflects the current CLI, not the last release.
      - name: Build lode
        run: cargo build --release
      - name: Put lode on PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"
      # Install VHS + deps directly — vhs-action's bundled ffmpeg installer fails on the runner.
      # (go-rod fetches a headless Chromium at render time, so none is installed here.)
      - name: Install VHS and dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Render demo.tape
        run: vhs demo.tape
      - name: Upload the GIF for review
        uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: assets/demo.gif
      - name: Commit the regenerated GIF
        if: ${{ inputs.publish }}
        run: |
          git add assets/demo.gif
          if git diff --cached --quiet; then
            echo "GIF unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Dodge git's HTTP/2 "error 400" when pushing a multi-MB binary.
          git config http.version HTTP/1.1
          git config http.postBuffer 524288000
          git commit -m "docs: regenerate demo gif [skip ci]"
          # main may have moved while rendering (a release, etc.); rebase the gif commit on top so a
          # concurrent push doesn't reject this one.
          git pull --rebase origin main
          git push
